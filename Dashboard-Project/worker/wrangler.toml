name = "patient-bird-ad34"
main = "index.js"
compatibility_date = "2024-01-01"

# KV namespace for rank tracker storage
# CREATE FIRST: Cloudflare Dashboard → Workers & Pages → KV → Create namespace → name it "rank-tracker"
# Then replace PASTE_KV_ID_HERE with the namespace ID
[[kv_namespaces]]
binding = "RANKS_KV"
id = "PASTE_KV_ID_HERE"

# Cron: every 3 days at 7:00 UTC = 9:00 AM Greece (EET/winter)
# Runs on days 1, 4, 7, 10, 13, 16, 19, 22, 25, 28, 31 of each month
[triggers]
crons = ["0 7 */3 * *"]
